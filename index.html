@page { size: A4; margin: 8mm 10mm; }
body { margin: 0; padding: 0; background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.print-page { page-break-after: always; padding: 0; font-family: 'Pretendard Variable','Pretendard',-apple-system,'Malgun Gothic','\u{B9D1}\u{C740} \u{ACE0}\u{B515}',sans-serif; font-size: 9.5pt; line-height: 1.55; color: #1a1a1a; }
.print-page:last-child { page-break-after: auto; }

.cover-page { background: #fff; display: flex; align-items: center; justify-content: center; height: 257mm; border: 2px solid #1B4332; box-sizing: border-box; overflow: hidden; }
.cover-inner { text-align: center; }
.cover-title { font-size: 26pt; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6pt; color: #1B4332; }
.cover-subtitle { font-size: 12pt; font-weight: 600; margin: 0 0 3pt; }
.cover-ko { font-size: 9.5pt; color: #666; margin: 0 0 16pt; }
.cover-academy { font-size: 11pt; font-weight: 700; margin: 0 0 3pt; }
.cover-unit { font-size: 9.5pt; margin: 0 0 3pt; }
.cover-grade { font-size: 9.5pt; color: #888; margin: 0 0 16pt; }
.cover-toc { color: #555; font-size: 8pt; line-height: 1.6; margin: 0 0 16pt; }
.cover-toc p { margin: 0; }
.cover-brand { font-size: 7.5pt; color: #bbb; margin: 0; }

.page-hdr { display: flex; justify-content: space-between; align-items: center; padding: 4pt 8pt; font-size: 7pt; font-weight: 600; color: #fff; background: #1B4332; border-bottom: 3px solid; margin-bottom: 8pt; }
.part-title { font-size: 14pt; font-weight: 800; margin: 0 0 2pt; letter-spacing: -0.01em; }
.part-title small { font-size: 8pt; font-weight: 400; color: #999; margin-left: 6pt; }
.part-line { height: 2px; margin-bottom: 10pt; }
.section-hint { font-size: 8pt; color: #888; margin: 0 0 8pt; font-style: italic; }

.text-body { font-size: 10pt; line-height: 1.7; white-space: pre-wrap; margin-bottom: 12pt; font-family: Georgia,'Times New Roman',serif; }

/* Part 2: \u{BB38}\u{B2E8}\u{BCC4} \u{D575}\u{C2EC} \u{D30C}\u{C545} */
.gist-item { margin-bottom: 10pt; page-break-inside: avoid; background: #F0F8F6; padding: 6pt 8pt; border-radius: 4pt; border-left: 3px solid #16A085; }
.gist-preview { font-size: 7.5pt; color: #16A085; font-weight: 700; margin: 0 0 3pt; }
.gist-q { font-size: 9.5pt; font-weight: 600; margin: 0 0 3pt; }
.gist-choice { font-size: 9pt; color: #444; margin: 0 0 1pt; padding-left: 10pt; }
.gist-kw { font-size: 8pt; color: #999; margin: 3pt 0 0; }

.mc-item { margin-bottom: 10pt; page-break-inside: avoid; }
.mc-q { font-size: 10pt; font-weight: 600; margin: 0 0 3pt; }
.mc-choice { font-size: 9pt; color: #555; margin: 0 0 1pt; padding-left: 16pt; line-height: 1.5; }
.mc-answer { font-size: 8pt; color: #bbb; margin: 2pt 0 0; padding-left: 16pt; }

/* Part 4: \u{AE00}\u{C758} \u{AD6C}\u{C870}\u{C640} \u{C694}\u{C57D} */
.struct-block { margin-bottom: 14pt; page-break-inside: avoid; }
.struct-sec { font-size: 9.5pt; font-weight: 700; color: #B8860B; margin: 0 0 5pt; }
.struct-summary { font-size: 10pt; line-height: 1.8; background: #FFFBEF; padding: 8pt 10pt; border-radius: 4pt; border: 1px solid #F0E4C0; }
.struct-order-item { font-size: 9.5pt; margin: 0 0 5pt; padding: 4pt 8pt; background: #FFFBEF; border-radius: 3pt; }

/* Part 5: \u{C5B4}\u{D718} \u{B9E4}\u{CE6D} & \u{C9C8}\u{BB38} \u{B9CC}\u{B4E4}\u{AE30} (bridge) */
.bridge-bank { display: flex; flex-wrap: wrap; gap: 6pt; justify-content: center; border: 1.5px dashed #90A4AE; border-radius: 6pt; padding: 8pt; margin-bottom: 10pt; }
.bridge-bank span { font-size: 9pt; font-weight: 700; padding: 2pt 8pt; background: #ECEFF1; border-radius: 10pt; }
.bridge-item { font-size: 9.5pt; margin: 0 0 6pt; }
.bridge-blank { color: #ccc; margin-left: 4pt; }
.bridge-qbox { margin-top: 14pt; page-break-inside: avoid; }
.bridge-qlabel { font-size: 8.5pt; font-weight: 700; color: #37474F; margin: 0 0 5pt; }
.bridge-qtable { width: 100%; border-collapse: collapse; font-size: 8.5pt; }
.bridge-qtable th { text-align: left; padding: 3pt 6pt; font-size: 7pt; background: #ECEFF1; border: 0.5px solid #ccc; }
.bridge-qtable td { border: 0.5px solid #ccc; height: 20pt; }
.bridge-qtable th:first-child, .bridge-qtable td:first-child { width: 45pt; }

.print-no-break { page-break-after: always; page-break-inside: avoid; }
.tf-section-label { font-size: 8pt; font-weight: 700; color: #2E7D32; margin: 6pt 0 2pt; }
.tf-table { width: 100%; border-collapse: collapse; font-size: 9pt; }
.tf-table th { text-align: left; padding: 4pt 6pt; font-size: 7pt; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1.5px solid #2E7D32; color: #2E7D32; }
.tf-table th:nth-child(3),.tf-table th:nth-child(4) { text-align: center; width: 28pt; }
.tf-table td { padding: 4pt 6pt; border-bottom: 0.5px solid #eee; vertical-align: top; }
.tf-table td:nth-child(3),.tf-table td:nth-child(4) { text-align: center; font-size: 10pt; }
.tf-compact th { padding: 2pt 4pt; font-size: 6.5pt; }
.tf-compact td { padding: 2.5pt 4pt; font-size: 8pt; line-height: 1.3; }
.tf-compact td:nth-child(3),.tf-compact td:nth-child(4) { font-size: 9pt; }

.wr-item { margin-bottom: 12pt; page-break-inside: avoid; }
.wr-type { font-size: 7.5pt; font-weight: 700; color: #00838F; margin: 0 0 1pt; }
.wr-q { font-size: 10pt; font-weight: 500; margin: 0 0 4pt; }
.wr-lines div { border-bottom: 0.5px solid #ccc; height: 18pt; }

/* Part 7: \u{B0B4}\u{C6A9} \u{C815}\u{B9AC} \u{C4F0}\u{AE30} */
.write-block { margin-bottom: 16pt; page-break-inside: avoid; }
.write-sec { font-size: 10pt; font-weight: 700; color: #AD1457; margin: 0 0 4pt; }
.write-prompt { font-size: 9.5pt; font-weight: 600; margin: 0 0 4pt; }
.write-guide { font-size: 8pt; color: #888; margin: 0 0 4pt; padding-left: 14pt; }
.write-guide li { margin-bottom: 1pt; }
.write-len { font-size: 7.5pt; color: #AD1457; margin: 0 0 6pt; }
.write-lines { display: flex; flex-direction: column; gap: 7pt; }
.write-line { border-bottom: 0.5px solid #ccc; height: 14pt; }

.vocab-sec { font-size: 9pt; font-weight: 700; color: #8B4513; margin: 8pt 0 4pt; }
.vocab-grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12pt; }
.vocab-grid-2col .vocab-table { font-size: 8pt; }
.vocab-grid-2col .vocab-table th { font-size: 6.5pt; padding: 2pt 4pt; }
.vocab-grid-2col .vocab-table td { padding: 2pt 4pt; font-size: 8pt; }
.vocab-table { width: 100%; border-collapse: collapse; font-size: 9pt; margin-bottom: 6pt; }
.vocab-table th { text-align: left; padding: 3pt 6pt; font-size: 7pt; font-weight: 700; background: #FFF8EB; border-bottom: 1px solid #ddd; color: #8B4513; }
.vocab-table td { padding: 3pt 6pt; border-bottom: 0.5px solid #f0f0f0; }
.vocab-word { font-weight: 600; }
.vocab-blank { color: #ccc; }
.vocab-ctx-grid { columns: 2; column-gap: 12pt; }
.vocab-ctx { font-size: 8.5pt; margin-bottom: 4pt; break-inside: avoid; }
.vocab-ctx p { margin: 0; }
.vocab-choices { font-size: 7.5pt; color: #888; margin-left: 12pt; }
.vocab-deriv { font-size: 9pt; margin: 0 0 3pt; }

.ans-sec { font-size: 9pt; font-weight: 700; color: #7030A0; margin: 8pt 0 4pt; border-bottom: 1px solid #eee; padding-bottom: 2pt; }
.ans-item { font-size: 8.5pt; margin: 0 0 2pt; page-break-inside: avoid; }
.ans-written { margin-bottom: 6pt; page-break-inside: avoid; }
.ans-q { font-size: 8.5pt; font-weight: 600; color: #7030A0; margin: 0; }
.ans-model { font-size: 8.5pt; color: #2E7D32; margin: 0; }
.ans-score { font-size: 7.5pt; color: #888; margin: 0; }
.ans-vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2pt; font-size: 7.5pt; }

.tg-sec { font-size: 9pt; font-weight: 700; color: #BF6900; margin: 8pt 0 3pt; }
.tg-item { font-size: 8.5pt; margin: 0 0 2pt; }
